<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | LinguaPro</title>

<link rel="stylesheet" href="/Frontend/CSS/dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<h2 class="logo">LinguaPro</h2>

<ul>

<li>Inicio</li>
<li>Mis Cursos</li>
<li>Progreso</li>
<li>Certificados</li>
<li>Configuración</li>

</ul>

</aside>


<!-- CONTENIDO PRINCIPAL -->

<main class="main-content">

<header class="topbar">

<h1>Bienvenido, Estudiante</h1>

<div class="profile">
Mi perfil
</div>

</header>


<!-- ESTADISTICAS -->

<section class="stats">

<div class="stat-card">
<h3>Cursos activos</h3>
<p>3</p>
</div>

<div class="stat-card">
<h3>Lecciones completadas</h3>
<p>24</p>
</div>

<div class="stat-card">
<h3>Horas de estudio</h3>
<p>12h</p>
</div>

</section>


<!-- CURSOS -->

<section class="my-courses">

<h2>Mis Cursos</h2>

<div class="course-container">

<div class="course-card">

<h3>Inglés Profesional</h3>

<p>Progreso</p>

<div class="progress-bar">
<div class="progress" style="width:60%"></div>
</div>

<button>Continuar</button>

</div>


<div class="course-card">

<h3>Francés Básico</h3>

<p>Progreso</p>

<div class="progress-bar">
<div class="progress" style="width:40%"></div>
</div>

<button>Continuar</button>

</div>


<div class="course-card">

<h3>Alemán Conversacional</h3>

<p>Progreso</p>

<div class="progress-bar">
<div class="progress" style="width:25%"></div>
</div>

<button>Continuar</button>

</div>

</div>

</section>

</main>

</div>

</body>
</html>

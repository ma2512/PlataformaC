<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pago | LinguaPro</title>

<link rel="stylesheet" href="/Frontend/CSS/pago.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<header class="header">

<h2>LinguaPro</h2>

</header>


<section class="payment-container">

<div class="payment-box">

<h2>Completar pago</h2>

<p>Plan seleccionado: <strong>Pro - $19 / mes</strong></p>

<form>

<div class="input-group">

<label>Nombre del titular</label>
<input type="text" placeholder="Nombre en la tarjeta">

</div>


<div class="input-group">

<label>Número de tarjeta</label>

<input type="text" placeholder="1234 5678 9012 3456">

</div>

<div class="row">

<div class="input-group">
<label>Vencimiento</label>
<input type="text" placeholder="MM/AA">
</div>

<div class="input-group">
<label>CVV</label>
<input type="text" placeholder="123">
</div>

</div>


<div class="input-group">

<label>Correo electrónico</label>
<input type="email" placeholder="correo@email.com">

</div>


<button class="pay-btn">Pagar ahora</button>

<p class="secure">🔒 Pago seguro con cifrado SSL</p>

</form>

<div class="back-links">

</div>


</div>

</section>


<footer>

<p>Pago seguro | LinguaPro</p>

</footer>

</body>
</html>
